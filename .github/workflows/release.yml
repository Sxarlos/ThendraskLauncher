name: Release

on:
  push:
    tags:
      # Stable releases:      v1.2.3
      # Beta / RC prereleases: v1.2.3-beta.1, v1.2.3-rc.2, ...
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Determines which OSes the release job's matrix builds on. Platform policy:
  # stable tags (no "-") ship Windows-only — Windows is the stable update
  # channel. Prerelease tags (containing "-") ship on all three OSes — the
  # macOS/Linux public beta only ever arrives via prerelease tags. The
  # `matrix` context isn't available in job-level `if`, so this is computed
  # here as a job output and consumed via `fromJson()` in the release job's
  # matrix instead.
  plan:
    runs-on: ubuntu-latest
    outputs:
      oses: ${{ steps.set-oses.outputs.oses }}
    steps:
      - name: Determine target OSes
        id: set-oses
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo 'oses=["windows-latest","macos-latest","ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'oses=["windows-latest"]' >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.plan.outputs.oses) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx electron-vite build

      # electron-builder reads the "publish" config in package.json (GitHub
      # provider) and, with --publish always, uploads each platform's installers
      # plus the electron-updater metadata (latest.yml / latest-mac.yml /
      # latest-linux.yml) to one GitHub Release for this tag. The launcher's
      # self-updater (src/main/updater.ts) consumes that metadata.
      #
      # A tag WITHOUT a prerelease suffix (e.g. v0.4.0) publishes a normal, full
      # release and, per the `plan` job above, only ever runs on windows-latest
      # — Windows is the stable update channel. A tag WITH one (e.g.
      # v0.4.0-beta.1, v0.4.0-rc.2 — anything containing "-") publishes a
      # GitHub *prerelease* and runs on all three OSes: GitHub's "latest
      # release" API and electron-updater's stable channel both ignore it, so
      # existing users are never auto-pushed a beta — only people who
      # deliberately grab it from the Releases page get the Mac/Linux/Windows
      # public beta builds.

      - name: Package and publish (stable)
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --publish always

      - name: Package and publish (prerelease)
        if: ${{ contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          EP_PRE_RELEASE: 'true'
        run: npx electron-builder --publish always

      # Legacy launcher versions (<= 0.3.25) ship a hand-rolled updater that,
      # when applying an update, looks for a release asset named exactly
      # "<exe-asset-name>.sha256" and verifies the downloaded installer's
      # SHA-256 against its first whitespace-delimited token. If the asset is
      # missing they silently skip verification (console warning only), so
      # this file must keep being published even though electron-updater
      # itself doesn't need it. Do not remove it.
      - name: Publish legacy .sha256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Path dist -Filter *.exe | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash.ToLower()
          # electron-builder's GitHub publisher replaces spaces in asset names
          # with dashes when uploading, so the checksum file (and the name
          # inside it) must match that sanitized form.
          $assetName = $exe.Name -replace ' ', '-'
          $checksumFile = Join-Path dist "$assetName.sha256"
          "$hash  $assetName" | Out-File -FilePath $checksumFile -Encoding ascii -NoNewline
          gh release upload "$env:GITHUB_REF_NAME" $checksumFile --clobber
